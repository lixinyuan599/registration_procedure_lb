<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/tabler.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/tabler-icons.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/fontawesome.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/select2.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/flatpickr.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/main.css') }}">
  {% if admin.favicon_url %}
  <link rel="icon" href="{{ admin.favicon_url }}">
  {% endif %}
  {% block head %}
  {% endblock %}
  <title>{{ admin.title }}</title>
</head>

<body>
  {% block body %}
  <main>
    {% block main %}
    {% endblock %}
  </main>
  {% endblock %}
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/jquery.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/tabler.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/popper.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/bootstrap.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/select2.full.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/flatpickr.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/main.js') }}"></script>

  <script type="text/javascript">
  $(document).ready(function() {

    // ========== 1. 出诊门店 Select2 自定义 (支持空搜索) ==========
    $(':input[data-role="select2-ajax"]').each(function () {
      var $el = $(this);
      var fieldName = $el.attr("name");
      if (fieldName !== "clinics") return;

      var savedData = $el.data("json") || [];
      $el.select2('destroy');
      $el.empty();
      $el.select2({
        minimumInputLength: 0,
        allowClear: true,
        placeholder: "点击选择门店...",
        ajax: {
          url: "/internal/clinics",
          dataType: "json",
          delay: 100,
          data: function (params) {
            return { term: params.term || "" };
          },
          processResults: function (data) {
            return data;
          }
        }
      });
      for (var i = 0; i < savedData.length; i++) {
        var d = savedData[i];
        if (d.id) {
          var option = new Option(d.text, d.id, true, true);
          $el.append(option).trigger("change");
        }
      }
    });

    // ========== 2. 汉化删除确认弹窗的动态文本 ==========
    // main.js 会监听 modal show 事件并设置英文文本, 这里在 shown 之后覆盖
    var $deleteModal = $('#modal-delete');
    if ($deleteModal.length) {
      $deleteModal.on('shown.bs.modal', function () {
        var $text = $('#modal-delete-text');
        var content = $text.html();
        if (content) {
          // "Are you sure you want to delete ..." -> "确定要删除 ... 吗？"
          content = content.replace(/Are you sure you want to delete\s*/gi, '确定要删除 ');
          content = content.replace(/\s*\?/g, ' 吗？');
          // "Are you sure you want to delete selected items?" -> "确定要删除选中的项目吗？"
          content = content.replace(/selected items/gi, '选中的项目');
          $text.html(content);
        }
      });
    }

    // ========== 3. 汉化 Flash 消息 ==========
    $('.alert').each(function () {
      var $alert = $(this);
      var text = $alert.text().trim();
      text = text.replace(/was successfully created/gi, '创建成功');
      text = text.replace(/was successfully updated/gi, '更新成功');
      text = text.replace(/Were successfully deleted/gi, '已成功删除');
      text = text.replace(/were successfully deleted/gi, '已成功删除');
      text = text.replace(/was successfully deleted/gi, '已成功删除');
      text = text.replace(/Successfully/gi, '操作成功');
      if (text !== $alert.text().trim()) {
        // 保留关闭按钮
        var $closeBtn = $alert.find('.btn-close');
        $alert.text(text);
        if ($closeBtn.length) $alert.prepend($closeBtn);
      }
    });

    // ========== 4. 图片 URL 字段添加上传按钮 + 清除按钮 ==========
    $('input[name="avatar_url"], input[name="image_url"]').each(function () {
      var $input = $(this);
      var fieldName = $input.attr("name");
      var label = fieldName === "avatar_url" ? "上传头像" : "上传图片";

      var $wrap = $('<div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;"></div>');
      var $fileInput = $('<input type="file" accept="image/*" style="display:none;">');
      var $btn = $('<button type="button" class="btn btn-sm btn-outline-primary">' + label + '</button>');
      var $clearBtn = $('<button type="button" class="btn btn-sm btn-outline-danger" style="display:none;">清除</button>');
      var $status = $('<span style="font-size:13px;color:#999;"></span>');
      var $preview = $('<img style="max-height:60px;border-radius:6px;display:none;margin-left:4px;">');

      $wrap.append($fileInput).append($btn).append($clearBtn).append($status).append($preview);
      $input.after($wrap);

      function syncUI() {
        var v = $input.val();
        if (v) {
          $preview.attr("src", v).show();
          $clearBtn.show();
        } else {
          $preview.hide();
          $clearBtn.hide();
        }
      }
      syncUI();

      $input.on("change input", syncUI);

      $clearBtn.on("click", function () {
        $input.val("").trigger("change");
        $status.html('已清除，请点击页面底部 <b>「保存」</b> 按钮保存修改').css("color", "#e67e22");
        $fileInput.val("");
      });

      $btn.on("click", function () { $fileInput.click(); });

      $fileInput.on("change", function () {
        var file = this.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
          $status.text("文件不能超过 5MB").css("color", "red");
          return;
        }
        $status.text("上传中...").css("color", "#999");
        $btn.prop("disabled", true);

        var formData = new FormData();
        formData.append("file", file);

        $.ajax({
          url: "/internal/upload",
          type: "POST",
          data: formData,
          processData: false,
          contentType: false,
          success: function (data) {
            if (data.error) {
              $status.text(data.error).css("color", "red");
            } else {
              $input.val(data.url).trigger("change");
              $status.html('<span style="color:green;">上传成功</span>，请点击页面底部 <b>「保存」</b> 按钮保存修改').css("color", "#e67e22");
            }
            $btn.prop("disabled", false);
          },
          error: function (xhr) {
            var msg = "上传失败";
            if (xhr.status === 413) {
              msg = "文件太大，请压缩后重试";
            } else if (xhr.status === 404) {
              msg = "上传接口不存在，请更新后端代码";
            } else if (xhr.responseJSON && xhr.responseJSON.error) {
              msg = xhr.responseJSON.error;
            } else if (xhr.status) {
              msg = "上传失败 (" + xhr.status + ")";
            }
            $status.text(msg).css("color", "red");
            $btn.prop("disabled", false);
          }
        });
      });
    });

    // ========== 5. Select2 默认语言汉化 ==========
    if ($.fn.select2 && $.fn.select2.defaults) {
      $.fn.select2.defaults.set("language", {
        errorLoading: function () { return "加载失败"; },
        inputTooLong: function (args) { return "请删除多余的 " + (args.input.length - args.maximum) + " 个字符"; },
        inputTooShort: function (args) { return "请再输入至少 " + (args.minimum - args.input.length) + " 个字符"; },
        loadingMore: function () { return "加载更多..."; },
        maximumSelected: function (args) { return "最多只能选择 " + args.maximum + " 项"; },
        noResults: function () { return "未找到结果"; },
        searching: function () { return "搜索中..."; },
        removeAllItems: function () { return "移除所有项"; }
      });
    }

  });
  </script>

  {% block tail %}
  {% endblock %}
</body>

</html>
